<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Feedback admin</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
  :root { --bg:#f7f7f8; --card:#fff; --border:#e5e7eb; --muted:#6b7280; --accent:#1f2937; }
  * { box-sizing:border-box; }
  body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; background:var(--bg); color:#111; }
  header { padding:14px 28px; border-bottom:1px solid var(--border); background:#fff; display:flex; align-items:center; gap:18px; }
  header h1 { margin:0; font-size:17px; font-weight:600; }
  nav a { color:#444; text-decoration:none; padding:8px 12px; border-radius:6px; font-size:14px; }
  nav a.active { background:#eef2ff; color:#1e3a8a; font-weight:500; }
  nav a:hover:not(.active) { background:#f1f5f9; }
  .right { margin-left:auto; font-size:13px; color:var(--muted); }
  .right input { padding:5px 8px; border:1px solid var(--border); border-radius:6px; font-size:12px; width:200px; }

  .layout { display:grid; grid-template-columns:380px 1fr; height:calc(100vh - 53px); }
  .list { overflow:auto; border-right:1px solid var(--border); background:#fff; }
  .item { padding:14px 18px; border-bottom:1px solid var(--border); cursor:pointer; }
  .item:hover { background:#fafafa; }
  .item.active { background:#eef2ff; }
  .item-head { display:flex; gap:8px; align-items:center; font-size:12px; color:var(--muted); margin-bottom:4px; }
  .badge { padding:2px 7px; border-radius:10px; font-size:11px; font-weight:600; }
  .badge.bug { background:#fee2e2; color:#991b1b; }
  .badge.feature { background:#fef3c7; color:#92400e; }
  .badge.sent { background:#dcfce7; color:#166534; }
  .badge.error { background:#fee2e2; color:#991b1b; }
  .badge.skipped { background:#e5e7eb; color:#374151; }
  .item-msg { font-size:13px; color:#111; overflow:hidden; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; }

  .detail { padding:24px 32px; overflow:auto; }
  .empty { color:var(--muted); padding:40px; text-align:center; }
  .meta { display:grid; grid-template-columns:auto 1fr; gap:6px 14px; font-size:13px; margin:18px 0; }
  .meta dt { color:var(--muted); }
  .meta dd { margin:0; word-break:break-all; }
  pre { background:#fff; border:1px solid var(--border); border-radius:8px; padding:14px; white-space:pre-wrap; font-family:inherit; font-size:14px; }
  img.shot { max-width:100%; border:1px solid var(--border); border-radius:8px; margin-top:12px; }

  .panel { padding:24px 32px; max-width:780px; }
  .panel h2 { margin-top:0; font-size:18px; }
  .card { background:#fff; border:1px solid var(--border); border-radius:10px; padding:16px 18px; margin-bottom:16px; }
  .card h3 { margin:0 0 6px; font-size:15px; }
  .card .sub { color:var(--muted); font-size:12px; margin-bottom:10px; }
  label { display:block; font-size:12px; font-weight:500; color:#374151; margin-top:10px; }
  input[type=text], input[type=password], textarea, select { width:100%; padding:8px 10px; border:1px solid var(--border); border-radius:6px; font-size:13px; font-family:inherit; }
  textarea { min-height:64px; resize:vertical; }
  .row { display:flex; gap:8px; margin-top:12px; }
  .btn { padding:8px 14px; border-radius:6px; border:none; cursor:pointer; font-size:13px; font-weight:500; }
  .btn-primary { background:var(--accent); color:#fff; }
  .btn-primary:hover { opacity:.9; }
  .btn-ghost { background:#f1f5f9; color:#111; }
  .btn-ghost:hover { background:#e2e8f0; }
  .btn-danger { background:#fee2e2; color:#991b1b; }
  .chip { display:inline-block; background:#eef2ff; color:#1e3a8a; padding:2px 8px; border-radius:10px; font-size:12px; margin:2px 4px 2px 0; }
  .conn-list { display:flex; flex-direction:column; gap:10px; }
  .conn-item { border:1px solid var(--border); border-radius:8px; padding:12px; }
  .conn-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
  .conn-fields { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .conn-fields label { margin-top:0; }
  .conn-fields .full { grid-column: span 2; }

  /* Projects: searchable combobox + full-width detail */
  .pj-page { display:flex; flex-direction:column; height:calc(100vh - 53px); }
  .pj-bar { padding:14px 28px; border-bottom:1px solid var(--border); background:#fff; display:flex; gap:10px; align-items:center; justify-content:center; }
  .pj-bar > * { flex-shrink:0; }
  .pj-bar .pj-combo { flex:1 1 auto; max-width:520px; position:relative; }
  .pj-bar .pj-combo > input { width:100%; padding:9px 36px 9px 12px; border:1px solid var(--border); border-radius:8px; font-size:14px; background:#fff; }
  .pj-bar .pj-combo > input:focus { outline:none; border-color:#6366f1; box-shadow:0 0 0 3px rgba(99,102,241,.15); }
  .pj-bar .pj-combo .pj-caret { position:absolute; right:10px; top:50%; transform:translateY(-50%); color:var(--muted); pointer-events:none; font-size:10px; }
  .pj-options { position:absolute; top:calc(100% + 4px); left:0; right:0; background:#fff; border:1px solid var(--border); border-radius:8px; box-shadow:0 8px 24px rgba(0,0,0,.08); max-height:380px; overflow:auto; z-index:10; }
  .pj-option { padding:10px 14px; cursor:pointer; display:grid; grid-template-columns:1fr auto; gap:2px 10px; border-bottom:1px solid #f3f4f6; }
  .pj-option:last-child { border-bottom:none; }
  .pj-option:hover, .pj-option.hl { background:#eef2ff; }
  .pj-option .nm { font-size:13px; font-weight:600; }
  .pj-option .ky { font-size:11px; color:var(--muted); font-family:ui-monospace,monospace; }
  .pj-option .stat { font-size:11px; color:var(--muted); text-align:right; align-self:center; }
  .pj-option .meta { grid-column:1/-1; font-size:11px; color:var(--muted); display:flex; gap:6px; align-items:center; }
  .pj-option .dot { width:6px; height:6px; border-radius:50%; background:#9ca3af; }
  .pj-option .dot.live { background:#22c55e; }
  .pj-option .dot.warn { background:#f59e0b; }
  .pj-option mark { background:#fef08a; color:inherit; padding:0; }
  .pj-noresults { padding:18px; text-align:center; color:var(--muted); font-size:13px; }
  .pj-summary { font-size:12px; color:var(--muted); padding:8px 14px; border-top:1px solid var(--border); background:#fafafa; position:sticky; bottom:0; }

  .pj-detail { padding:24px 32px; overflow:auto; flex:1; display:flex; flex-direction:column; align-items:center; }
  .pj-detail > * { width:100%; max-width:920px; }
  .pj-detail h2 { margin:0 0 6px; font-size:18px; display:flex; align-items:center; gap:10px; }
  .pj-detail .muted { color:var(--muted); font-size:13px; }
  .pj-section { margin-top:22px; }
  .pj-section h3 { font-size:13px; text-transform:uppercase; letter-spacing:.05em; color:var(--muted); margin:0 0 10px; }
  .pj-stat-grid { display:grid; grid-template-columns:repeat(3, 1fr); gap:10px; margin-top:8px; }
  .pj-stat { background:#fff; border:1px solid var(--border); border-radius:8px; padding:12px; }
  .pj-stat .v { font-size:20px; font-weight:600; }
  .pj-stat .l { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; }
  .copy-btn { padding:4px 9px; font-size:11px; background:#f1f5f9; border:1px solid var(--border); border-radius:4px; cursor:pointer; }
  .copy-btn:hover { background:#e2e8f0; }
  pre.embed { font-size:12px; padding:10px 12px; position:relative; }
  pre.embed .copy-btn { position:absolute; top:8px; right:8px; }
  .save-bar { position:sticky; bottom:0; background:#fff; border-top:1px solid var(--border); padding:12px 0; margin:24px -28px -24px; padding-left:28px; padding-right:28px; display:flex; gap:8px; align-items:center; }
  .save-bar .dirty { color:#92400e; font-size:12px; }
  .save-bar .saved { color:#166534; font-size:12px; }
  .deliveries { font-size:12px; margin-top:8px; }
  .deliveries .row { gap:6px; align-items:center; padding:4px 0; }
  .count { color:var(--muted); font-size:13px; }
  code { background:#f1f5f9; padding:1px 5px; border-radius:4px; font-size:12px; }
</style>
</head>
<body>
<header>
  <h1>Feedback</h1>
  <nav>
    <a href="#/reports" id="nav-reports">Reports</a>
    <a href="#/projects" id="nav-projects">Projects</a>
  </nav>
  <div class="right">
    Admin token: <input id="admin-token" placeholder="if FEEDBACK_ADMIN_TOKEN set">
  </div>
</header>
<div id="root"></div>

<script>
(function () {
  const root = document.getElementById('root');
  const tokenInput = document.getElementById('admin-token');
  tokenInput.value = localStorage.getItem('fb-admin-token') || '';
  tokenInput.oninput = () => { localStorage.setItem('fb-admin-token', tokenInput.value); };

  function api(path, opts = {}) {
    const headers = Object.assign({ 'Content-Type': 'application/json' }, opts.headers || {});
    if (tokenInput.value) headers.Authorization = 'Bearer ' + tokenInput.value;
    return fetch(path, Object.assign({}, opts, { headers })).then(async (r) => {
      if (!r.ok) {
        const t = await r.text().catch(() => '');
        throw new Error(`${r.status} ${t}`);
      }
      return r.json();
    });
  }
  function shotUrl(file) {
    if (!file) return null;
    const t = tokenInput.value;
    return '/screenshots/' + encodeURIComponent(file) + (t ? '?token=' + encodeURIComponent(t) : '');
  }

  function fmt(ts) { return new Date(ts).toLocaleString(); }
  function esc(s) { return (s == null ? '' : String(s)).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

  function setNav(route) {
    document.getElementById('nav-reports').classList.toggle('active', route === 'reports');
    document.getElementById('nav-projects').classList.toggle('active', route === 'projects');
  }

  // --- Reports view ---
  const reportsState = { active: null };
  async function showReports() {
    setNav('reports');
    root.innerHTML = `
      <div class="layout">
        <div class="list" id="rlist"></div>
        <div class="detail" id="rdetail"><div class="empty">Select a report to view details.</div></div>
      </div>`;
    const list = document.getElementById('rlist');
    const detail = document.getElementById('rdetail');
    let rows;
    try { rows = await api('/api/reports'); }
    catch (e) { list.innerHTML = `<div class="empty">${esc(e.message)}</div>`; return; }
    list.innerHTML = rows.map((row) => `
      <div class="item ${reportsState.active === row.id ? 'active' : ''}" data-id="${row.id}">
        <div class="item-head">
          <span class="badge ${row.kind}">${row.kind}</span>
          <span>${fmt(row.created_at)}</span>
          ${row.project ? `<span>· ${esc(row.project)}</span>` : ''}
          ${row.reporter ? `<span>· ${esc(row.reporter)}</span>` : ''}
        </div>
        <div class="item-msg">${esc(row.message)}</div>
      </div>`).join('') || '<div class="empty">No reports yet.</div>';
    list.querySelectorAll('.item').forEach((el) => {
      el.onclick = async () => {
        reportsState.active = el.dataset.id;
        list.querySelectorAll('.item').forEach((x) => x.classList.toggle('active', x.dataset.id === el.dataset.id));
        const row = await api('/api/reports/' + el.dataset.id);
        detail.innerHTML = `
          <div style="display:flex;align-items:center;gap:10px">
            <span class="badge ${row.kind}">${row.kind}</span>
            <span style="color:var(--muted);font-size:13px">${fmt(row.created_at)}</span>
          </div>
          <pre>${esc(row.message)}</pre>
          <dl class="meta">
            ${row.reporter ? `<dt>From</dt><dd>${esc(row.reporter)}</dd>` : ''}
            ${row.url ? `<dt>URL</dt><dd><a href="${esc(row.url)}" target="_blank">${esc(row.url)}</a></dd>` : ''}
            ${row.viewport ? `<dt>Viewport</dt><dd>${esc(row.viewport)}</dd>` : ''}
            ${row.user_agent ? `<dt>User-agent</dt><dd>${esc(row.user_agent)}</dd>` : ''}
            ${row.project ? `<dt>Project</dt><dd>${esc(row.project)}</dd>` : ''}
          </dl>
          ${row.deliveries && row.deliveries.length ? `
            <h3 style="font-size:14px;margin-top:18px">Connector deliveries</h3>
            <div class="deliveries">
              ${row.deliveries.map((d) => `
                <div class="row"><span class="badge ${d.status}">${d.status}</span><strong>${esc(d.connector)}</strong>
                  ${d.detail ? `<span style="color:var(--muted)">${esc(d.detail)}</span>` : ''}
                </div>`).join('')}
            </div>` : ''}
          ${row.screenshot_path ? `<img class="shot" src="${shotUrl(row.screenshot_path)}">` : ''}
        `;
      };
    });
  }

  // --- Projects view ---
  let connectorTypes = null;
  async function loadConnectorTypes() {
    if (connectorTypes) return connectorTypes;
    connectorTypes = await api('/api/connector-types');
    return connectorTypes;
  }

  // --- Projects (searchable combobox + full-width detail) ---
  const projectsState = {
    all: [], types: [],
    selected: null, // key
    draft: null,    // unsaved working copy of selected project
    dirty: false,
    comboQuery: '', comboOpen: false, comboHl: 0, comboLimit: 100,
  };

  async function showProjects() {
    setNav('projects');
    root.innerHTML = `
      <div class="pj-page">
        <div class="pj-bar">
          <div class="pj-combo" id="pj-combo">
            <input id="pj-combo-input" type="text" placeholder="Search projects by name, key, or domain…" autocomplete="off" spellcheck="false">
            <span class="pj-caret">▾</span>
          </div>
          <button class="btn btn-primary" id="pj-new">+ New project</button>
        </div>
        <div class="pj-detail" id="pj-detail"><div class="empty">Search above and pick a project, or create a new one.</div></div>
      </div>`;

    let projects, types;
    try { [projects, types] = await Promise.all([api('/api/projects'), loadConnectorTypes()]); }
    catch (e) { document.getElementById('pj-detail').innerHTML = `<div class="empty">${esc(e.message)}</div>`; return; }

    projectsState.all = projects;
    projectsState.types = types;
    if (projectsState.selected && !projects.find((p) => p.key === projectsState.selected)) {
      projectsState.selected = null;
      projectsState.draft = null;
    }

    bindCombobox();
    document.getElementById('pj-new').onclick = openNewProjectDialog;

    if (projectsState.selected) {
      setComboInputToSelection();
      renderProjectDetail();
    } else {
      // auto-focus combobox so the user can just start typing
      const input = document.getElementById('pj-combo-input');
      input.focus();
    }
  }

  function setComboInputToSelection() {
    const p = projectsState.all.find((x) => x.key === projectsState.selected);
    const input = document.getElementById('pj-combo-input');
    if (input && p) input.value = p.name || p.key;
  }

  function bindCombobox() {
    const combo = document.getElementById('pj-combo');
    const input = document.getElementById('pj-combo-input');

    function open() {
      projectsState.comboOpen = true;
      projectsState.comboHl = 0;
      renderComboOptions();
    }
    function close() {
      projectsState.comboOpen = false;
      const pop = document.getElementById('pj-options'); if (pop) pop.remove();
      const sum = document.getElementById('pj-summary'); if (sum) sum.remove();
      // restore name in input (in case they typed a query without picking)
      if (projectsState.selected) setComboInputToSelection();
      else input.value = '';
    }

    input.onfocus = () => { input.select(); open(); };
    input.oninput = () => { projectsState.comboQuery = input.value; projectsState.comboHl = 0; if (!projectsState.comboOpen) open(); else renderComboOptions(); };
    input.onkeydown = (e) => {
      if (!projectsState.comboOpen && (e.key === 'ArrowDown' || e.key === 'Enter')) { open(); e.preventDefault(); return; }
      if (!projectsState.comboOpen) return;
      const filtered = filterProjects();
      if (e.key === 'ArrowDown') { projectsState.comboHl = Math.min(filtered.length - 1, projectsState.comboHl + 1); renderComboOptions(); e.preventDefault(); }
      else if (e.key === 'ArrowUp') { projectsState.comboHl = Math.max(0, projectsState.comboHl - 1); renderComboOptions(); e.preventDefault(); }
      else if (e.key === 'Enter') {
        const pick = filtered[projectsState.comboHl];
        if (pick) selectProject(pick.key);
        close();
        e.preventDefault();
      } else if (e.key === 'Escape') {
        close();
      }
    };

    document.addEventListener('mousedown', (e) => {
      if (!projectsState.comboOpen) return;
      if (combo.contains(e.target)) return;
      const pop = document.getElementById('pj-options');
      if (pop && pop.contains(e.target)) return;
      close();
    });
  }

  function filterProjects() {
    const q = (projectsState.comboQuery || '').trim().toLowerCase();
    let list = projectsState.all.slice();
    if (q) {
      list = list.filter((p) =>
        p.key.toLowerCase().includes(q) ||
        (p.name || '').toLowerCase().includes(q) ||
        (p.allowed_domains || []).some((d) => d.toLowerCase().includes(q))
      );
    }
    // Sort: recent activity first, then by name. Keeps "recently noisy" projects on top.
    list.sort((a, b) => (b.last_report_at || b.created_at || 0) - (a.last_report_at || a.created_at || 0));
    return list;
  }

  function renderComboOptions() {
    const combo = document.getElementById('pj-combo');
    let pop = document.getElementById('pj-options');
    if (!pop) {
      pop = document.createElement('div');
      pop.className = 'pj-options';
      pop.id = 'pj-options';
      combo.appendChild(pop);
    }
    const list = filterProjects();
    const limit = projectsState.comboLimit;
    const slice = list.slice(0, limit);
    const q = projectsState.comboQuery.trim();

    if (!list.length) {
      pop.innerHTML = `<div class="pj-noresults">No projects match.</div>`;
      return;
    }

    pop.innerHTML = slice.map((p, i) => {
      const live = (p.allowed_domains || []).length > 0 ? 'live' : 'warn';
      const liveLabel = live === 'live' ? 'allowlist set' : 'allow-any (open)';
      const conns = (p.connectors || []).length;
      const last = p.last_report_at ? relTime(p.last_report_at) : 'no reports yet';
      return `
        <div class="pj-option ${i === projectsState.comboHl ? 'hl' : ''}" data-key="${esc(p.key)}" data-idx="${i}">
          <div class="nm">${highlight(p.name || p.key, q)}</div>
          <div class="stat"><strong>${p.report_count || 0}</strong> · ${esc(last)}</div>
          <div class="ky">${highlight(p.key, q)}</div>
          <div class="meta">
            <span class="dot ${live}"></span>
            <span>${esc(liveLabel)}</span>
            <span>·</span>
            <span>${conns} connector${conns === 1 ? '' : 's'}</span>
          </div>
        </div>`;
    }).join('') + (list.length > limit
      ? `<div class="pj-summary">Showing first ${limit} of ${list.length} matches — refine your search.</div>`
      : `<div class="pj-summary">${list.length} project${list.length === 1 ? '' : 's'}${q ? ` (filtered from ${projectsState.all.length})` : ''}</div>`);

    const allOpts = [...pop.querySelectorAll('.pj-option')];
    allOpts.forEach((el) => {
      el.onmouseenter = () => {
        projectsState.comboHl = Number(el.dataset.idx);
        // Class-only update — full re-render here would destroy the mousedown
        // handler before the browser dispatches the click.
        allOpts.forEach((o, i) => o.classList.toggle('hl', i === projectsState.comboHl));
      };
      el.onmousedown = (ev) => {
        ev.preventDefault();
        const key = el.dataset.key;
        projectsState.comboOpen = false;
        const pop2 = document.getElementById('pj-options'); if (pop2) pop2.remove();
        selectProject(key);
      };
    });

    // keep highlighted row visible
    const hl = pop.querySelector('.pj-option.hl');
    if (hl) hl.scrollIntoView({ block: 'nearest' });
  }

  function highlight(text, q) {
    if (!q) return esc(text);
    const i = text.toLowerCase().indexOf(q.toLowerCase());
    if (i < 0) return esc(text);
    return esc(text.slice(0, i)) + '<mark>' + esc(text.slice(i, i + q.length)) + '</mark>' + esc(text.slice(i + q.length));
  }

  async function selectProject(key) {
    if (projectsState.dirty) {
      if (!confirm('You have unsaved changes. Discard and switch project?')) return;
    }
    projectsState.selected = key;
    projectsState.dirty = false;
    projectsState.draft = null;
    document.querySelectorAll('.pj-row').forEach((el) => el.classList.toggle('active', el.dataset.key === key));
    try {
      const full = await api('/api/projects/' + encodeURIComponent(key));
      projectsState.draft = JSON.parse(JSON.stringify(full));
      renderProjectDetail();
    } catch (e) {
      document.getElementById('pj-detail').innerHTML = `<div class="empty">${esc(e.message)}</div>`;
    }
  }

  function renderProjectDetail() {
    const p = projectsState.draft;
    const types = projectsState.types;
    const summary = projectsState.all.find((x) => x.key === p.key) || {};
    const detail = document.getElementById('pj-detail');
    const embed = `<script src="${location.origin}/widget.js" data-project="${esc(p.key)}" defer><\/script>`;
    const liveBadge = (p.allowed_domains || []).length > 0
      ? '<span class="badge sent">allowlist active</span>'
      : '<span class="badge skipped">allow-any (open)</span>';

    detail.innerHTML = `
      <h2>${esc(p.name || p.key)} <code>${esc(p.key)}</code> ${liveBadge}</h2>
      <div class="muted">Created ${new Date(p.created_at).toLocaleDateString()}</div>

      <div class="pj-stat-grid">
        <div class="pj-stat"><div class="v">${summary.report_count || 0}</div><div class="l">Reports</div></div>
        <div class="pj-stat"><div class="v">${(p.connectors || []).length}</div><div class="l">Connectors</div></div>
        <div class="pj-stat"><div class="v">${summary.last_report_at ? relTime(summary.last_report_at) : '—'}</div><div class="l">Last activity</div></div>
      </div>

      <div class="pj-section">
        <h3>Embed</h3>
        <pre class="embed">${esc(embed)}<button class="copy-btn" data-copy="${esc(embed)}">Copy</button></pre>
      </div>

      <div class="pj-section">
        <h3>Display name</h3>
        <input id="pj-name" type="text" value="${esc(p.name || '')}">
      </div>

      <div class="pj-section">
        <h3>Allowed domains</h3>
        <div class="muted" style="margin-bottom:6px">One per line. Empty = allow any (open). Supports <code>*.example.com</code>, <code>localhost</code>.</div>
        <textarea id="pj-domains" placeholder="example.com&#10;*.example.com">${(p.allowed_domains || []).join('\n')}</textarea>
      </div>

      <div class="pj-section">
        <h3>Connectors</h3>
        <div class="conn-list" id="pj-connectors">
          ${(p.connectors || []).map((c, i) => renderConnectorEditor(c, i, types)).join('') || '<div class="muted">No connectors. Reports will only be stored locally.</div>'}
        </div>
        <div class="row">
          <select id="pj-conn-add-type">${types.map((t) => `<option value="${t.type}">${esc(t.label)}</option>`).join('')}</select>
          <button class="btn btn-ghost" id="pj-conn-add">+ Add connector</button>
        </div>
      </div>

      <div class="save-bar">
        <button class="btn btn-primary" id="pj-save">Save changes</button>
        ${p.key !== 'default' ? `<button class="btn btn-danger" id="pj-delete">Delete project</button>` : ''}
        <span id="pj-status"></span>
      </div>
    `;

    bindProjectDetail();
  }

  function renderConnectorEditor(c, idx, types) {
    const t = types.find((x) => x.type === c.type);
    if (!t) return `<div class="conn-item">Unknown connector type: <code>${esc(c.type)}</code> <button class="btn btn-danger" data-conn-remove="${idx}">Remove</button></div>`;

    const head = `
      <div class="conn-head">
        <strong>${esc(t.label)}</strong>
        <button class="btn btn-danger" data-conn-remove="${idx}">Remove</button>
      </div>
      <label>Send for kinds <span class="sub">(both checked = both)</span></label>
      <div>
        <label style="display:inline-block;margin-right:14px"><input type="checkbox" data-kind="bug"     ${(!c.kinds || c.kinds.includes('bug')) ? 'checked' : ''}> bug</label>
        <label style="display:inline-block"><input type="checkbox" data-kind="feature" ${(!c.kinds || c.kinds.includes('feature')) ? 'checked' : ''}> feature</label>
      </div>`;

    if (t.customUI === 'zoho-projects') {
      return `<div class="conn-item" data-conn-idx="${idx}" data-conn-type="${esc(c.type)}" data-custom="zoho">
        ${head}
        <div data-zoho-body>${renderZohoBody(c, idx, t)}</div>
      </div>`;
    }

    const cfg = c.config || {};
    const fields = t.fields.map((f) => {
      const val = cfg[f.key] == null ? '' : cfg[f.key];
      if (f.type === 'checkbox') {
        return `<label class="full"><input type="checkbox" data-cfg="${esc(f.key)}" ${val ? 'checked' : ''}> ${esc(f.label)}</label>`;
      }
      const inputType = f.type === 'password' ? 'password' : 'text';
      return `<label>${esc(f.label)}${f.required ? ' *' : ''}<input type="${inputType}" data-cfg="${esc(f.key)}" value="${esc(val)}" placeholder="${esc(f.placeholder || '')}"></label>`;
    }).join('');
    return `
      <div class="conn-item" data-conn-idx="${idx}" data-conn-type="${esc(c.type)}">
        ${head}
        <div class="conn-fields" style="margin-top:8px">${fields}</div>
      </div>`;
  }

  function renderZohoBody(c, idx, t) {
    const cfg = c.config || {};
    const connected = cfg.refreshToken === '***' || (cfg.refreshToken && cfg.refreshToken !== '');
    const oauthAvailable = t.oauthAvailable;
    const dc = cfg.dataCenter || 'com';

    if (!connected) {
      if (!oauthAvailable) {
        return `<div style="background:#fef3c7;border:1px solid #fde68a;border-radius:6px;padding:12px;margin-top:10px;font-size:13px;color:#92400e">
          <strong>Zoho OAuth not configured.</strong><br>
          The server operator needs to register a Zoho OAuth app at
          <a href="https://api-console.zoho.com" target="_blank" style="color:inherit">api-console.zoho.com</a>
          and set <code>FEEDBACK_ZOHO_CLIENT_ID</code> + <code>FEEDBACK_ZOHO_CLIENT_SECRET</code>.
          Once that's done, this connector will offer one-click sign-in.
        </div>`;
      }
      return `<div style="margin-top:12px">
        <button class="btn btn-primary" data-zoho-connect data-idx="${idx}">
          <svg style="width:14px;height:14px;vertical-align:-2px;margin-right:6px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.72"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.72-1.72"/></svg>
          Sign in with Zoho
        </button>
        <input type="hidden" data-cfg="dataCenter" value="${esc(dc)}">
        <div class="sub" style="margin-top:6px">Save the project first if this is a brand-new connector.</div>
      </div>`;
    }

    return `<div style="margin-top:10px">
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
        <span class="badge sent">Connected</span>
        <span class="muted" style="font-size:12px">data centre <strong>${esc(dc)}</strong></span>
        <button class="btn btn-ghost" data-zoho-reconnect data-idx="${idx}" style="margin-left:auto">Reconnect</button>
        <button class="btn btn-danger" data-zoho-disconnect data-idx="${idx}">Disconnect</button>
      </div>
      <div class="conn-fields" style="margin-top:12px">
        <label>Portal
          <select data-cfg="portalId" data-zoho-portals="${idx}">
            ${cfg.portalId ? `<option value="${esc(cfg.portalId)}" selected>${esc(cfg.portalName || cfg.portalId)}</option>` : `<option value="">— loading…</option>`}
          </select>
        </label>
        <label>Project
          <select data-cfg="projectId" data-zoho-projects="${idx}">
            ${cfg.projectId ? `<option value="${esc(cfg.projectId)}" selected>${esc(cfg.projectName || cfg.projectId)}</option>` : `<option value="">— pick portal first —</option>`}
          </select>
        </label>
        <label class="full">Task list
          <select data-cfg="tasklistId" data-zoho-tasklists="${idx}">
            ${cfg.tasklistId ? `<option value="${esc(cfg.tasklistId)}" selected>${esc(cfg.tasklistName || cfg.tasklistId)}</option>` : `<option value="">— pick project first —</option>`}
          </select>
        </label>
        <label class="full">Priority
          <select data-cfg="priority">
            ${['', 'None', 'Low', 'Medium', 'High'].map((v) => `<option value="${esc(v)}" ${cfg.priority === v || (!cfg.priority && v === '') ? 'selected' : ''}>${v ? esc(v) : '— not set —'}</option>`).join('')}
          </select>
        </label>
      </div>
      <input type="hidden" data-cfg="dataCenter" value="${esc(dc)}">
      <input type="hidden" data-cfg="refreshToken" value="***">
    </div>`;
  }

  function bindProjectDetail() {
    const p = projectsState.draft;
    const detail = document.getElementById('pj-detail');

    function markDirty() {
      projectsState.dirty = true;
      const status = document.getElementById('pj-status');
      if (status) { status.className = 'dirty'; status.textContent = 'Unsaved changes'; }
    }

    detail.querySelectorAll('input, textarea, select').forEach((el) => {
      el.addEventListener('input', markDirty);
      el.addEventListener('change', markDirty);
    });

    detail.querySelectorAll('[data-copy]').forEach((btn) => {
      btn.onclick = () => {
        navigator.clipboard.writeText(btn.dataset.copy);
        btn.textContent = 'Copied'; setTimeout(() => { btn.textContent = 'Copy'; }, 1200);
      };
    });

    detail.querySelectorAll('[data-conn-remove]').forEach((btn) => {
      btn.onclick = () => {
        const idx = Number(btn.dataset.connRemove);
        readDraftFromDom();
        p.connectors.splice(idx, 1);
        markDirty();
        renderProjectDetail();
      };
    });

    // --- Zoho OAuth wiring ---
    detail.querySelectorAll('[data-zoho-connect], [data-zoho-reconnect]').forEach((btn) => {
      btn.onclick = async () => {
        if (projectsState.dirty) {
          if (!confirm('Save your changes before starting OAuth — otherwise edits will be lost. Save now?')) return;
          await document.getElementById('pj-save').click();
        }
        const idx = Number(btn.dataset.idx);
        const item = btn.closest('.conn-item');
        const dc = item.querySelector('[data-cfg="dataCenter"]')?.value || 'com';
        const tok = (localStorage.getItem('fb-admin-token') || '');
        const params = new URLSearchParams({ project: p.key, idx: String(idx), dataCenter: dc });
        if (tok) params.set('token', tok);
        location.href = '/admin/api/oauth/zoho/start?' + params.toString();
      };
    });

    detail.querySelectorAll('[data-zoho-disconnect]').forEach((btn) => {
      btn.onclick = async () => {
        const idx = Number(btn.dataset.idx);
        if (!confirm('Disconnect Zoho? You will need to reconnect to send tasks.')) return;
        try {
          await api('/api/connectors/zoho/disconnect', { method: 'POST', body: JSON.stringify({ project: p.key, idx }) });
          // refresh draft
          projectsState.draft = await api('/api/projects/' + encodeURIComponent(p.key));
          renderProjectDetail();
        } catch (e) { alert(e.message); }
      };
    });

    // Populate Zoho dropdowns lazily as the user picks portal → project → tasklist.
    detail.querySelectorAll('[data-zoho-portals]').forEach((sel) => {
      const idx = Number(sel.dataset.zohoPortals);
      const cfg = p.connectors[idx]?.config || {};
      if (!cfg.refreshToken) return;
      // Always refresh portal list on render — cheap, and keeps it accurate.
      api(`/api/connectors/zoho/portals?project=${encodeURIComponent(p.key)}&idx=${idx}`)
        .then((portals) => {
          const current = cfg.portalId;
          sel.innerHTML = `<option value="">— select —</option>` +
            portals.map((x) => `<option value="${esc(x.id)}" ${current === x.id ? 'selected' : ''}>${esc(x.name)}</option>`).join('');
          // capture display names so we can show them after save
          sel.dataset.options = JSON.stringify(portals);
        })
        .catch((e) => { sel.innerHTML = `<option value="">${esc(e.message)}</option>`; });

      sel.addEventListener('change', () => {
        markDirty();
        // store name for later persistence
        const opts = safeParse(sel.dataset.options);
        const found = opts.find((x) => x.id === sel.value);
        cfg.portalName = found ? found.name : '';
        cfg.projectId = ''; cfg.projectName = '';
        cfg.tasklistId = ''; cfg.tasklistName = '';
        loadProjectDropdown(idx, sel.value);
      });
    });
    detail.querySelectorAll('[data-zoho-projects]').forEach((sel) => {
      const idx = Number(sel.dataset.zohoProjects);
      const cfg = p.connectors[idx]?.config || {};
      if (cfg.portalId) loadProjectDropdown(idx, cfg.portalId);
      sel.addEventListener('change', () => {
        markDirty();
        const opts = safeParse(sel.dataset.options);
        const found = opts.find((x) => x.id === sel.value);
        cfg.projectName = found ? found.name : '';
        cfg.tasklistId = ''; cfg.tasklistName = '';
        loadTasklistDropdown(idx, cfg.portalId, sel.value);
      });
    });
    detail.querySelectorAll('[data-zoho-tasklists]').forEach((sel) => {
      const idx = Number(sel.dataset.zohoTasklists);
      const cfg = p.connectors[idx]?.config || {};
      if (cfg.portalId && cfg.projectId) loadTasklistDropdown(idx, cfg.portalId, cfg.projectId);
      sel.addEventListener('change', () => {
        markDirty();
        const opts = safeParse(sel.dataset.options);
        const found = opts.find((x) => x.id === sel.value);
        cfg.tasklistName = found ? found.name : '';
      });
    });

    function loadProjectDropdown(idx, portalId) {
      const sel = detail.querySelector(`[data-zoho-projects="${idx}"]`);
      if (!sel) return;
      if (!portalId) { sel.innerHTML = '<option value="">— pick portal first —</option>'; return; }
      sel.innerHTML = '<option value="">— loading…</option>';
      api(`/api/connectors/zoho/projects?project=${encodeURIComponent(p.key)}&idx=${idx}&portalId=${encodeURIComponent(portalId)}`)
        .then((projects) => {
          const cfg = p.connectors[idx]?.config || {};
          sel.innerHTML = '<option value="">— select —</option>' +
            projects.map((x) => `<option value="${esc(x.id)}" ${cfg.projectId === x.id ? 'selected' : ''}>${esc(x.name)}</option>`).join('');
          sel.dataset.options = JSON.stringify(projects);
        })
        .catch((e) => { sel.innerHTML = `<option value="">${esc(e.message)}</option>`; });
    }
    function loadTasklistDropdown(idx, portalId, projectId) {
      const sel = detail.querySelector(`[data-zoho-tasklists="${idx}"]`);
      if (!sel) return;
      if (!portalId || !projectId) { sel.innerHTML = '<option value="">— pick project first —</option>'; return; }
      sel.innerHTML = '<option value="">— loading…</option>';
      api(`/api/connectors/zoho/tasklists?project=${encodeURIComponent(p.key)}&idx=${idx}&portalId=${encodeURIComponent(portalId)}&projectId=${encodeURIComponent(projectId)}`)
        .then((lists) => {
          const cfg = p.connectors[idx]?.config || {};
          sel.innerHTML = '<option value="">— none (use project default) —</option>' +
            lists.map((x) => `<option value="${esc(x.id)}" ${cfg.tasklistId === x.id ? 'selected' : ''}>${esc(x.name)}</option>`).join('');
          sel.dataset.options = JSON.stringify(lists);
        })
        .catch((e) => { sel.innerHTML = `<option value="">${esc(e.message)}</option>`; });
    }
    function safeParse(s) { try { return JSON.parse(s); } catch { return []; } }

    document.getElementById('pj-conn-add').onclick = () => {
      readDraftFromDom();
      const type = document.getElementById('pj-conn-add-type').value;
      p.connectors = p.connectors || [];
      p.connectors.push({ type, config: {} });
      markDirty();
      renderProjectDetail();
    };

    document.getElementById('pj-save').onclick = async () => {
      readDraftFromDom();
      const body = {
        name: p.name,
        allowed_domains: p.allowed_domains,
        connectors: p.connectors,
      };
      try {
        await api('/api/projects/' + encodeURIComponent(p.key), { method: 'PATCH', body: JSON.stringify(body) });
        projectsState.dirty = false;
        const status = document.getElementById('pj-status');
        if (status) { status.className = 'saved'; status.textContent = 'Saved'; setTimeout(() => { if (status.textContent === 'Saved') status.textContent = ''; }, 1500); }
        // refresh summary stats
        const fresh = await api('/api/projects');
        projectsState.all = fresh;
        renderProjectList();
      } catch (e) { alert(e.message); }
    };

    const del = document.getElementById('pj-delete');
    if (del) del.onclick = async () => {
      if (!confirm(`Delete project "${p.key}"? Reports stay; ingest stops.`)) return;
      try {
        await api('/api/projects/' + encodeURIComponent(p.key), { method: 'DELETE' });
        projectsState.selected = null; projectsState.draft = null; projectsState.dirty = false;
        showProjects();
      } catch (e) { alert(e.message); }
    };
  }

  function readDraftFromDom() {
    const p = projectsState.draft;
    p.name = document.getElementById('pj-name').value.trim();
    p.allowed_domains = document.getElementById('pj-domains').value
      .split(/[\n,]/).map((s) => s.trim()).filter(Boolean);
    p.connectors = [...document.querySelectorAll('#pj-connectors .conn-item')].map((el) => {
      const type = el.dataset.connType;
      const config = {};
      el.querySelectorAll('[data-cfg]').forEach((inp) => {
        const k = inp.dataset.cfg;
        if (inp.type === 'checkbox') config[k] = inp.checked;
        else if (inp.value !== '') config[k] = inp.value;
      });
      const kinds = [...el.querySelectorAll('[data-kind]')].filter((x) => x.checked).map((x) => x.dataset.kind);
      const out = { type, config };
      if (kinds.length && kinds.length < 2) out.kinds = kinds;
      return out;
    });
  }

  function openNewProjectDialog() {
    const key = (prompt('Project key (lowercase, a-z 0-9 _ -):') || '').trim();
    if (!key) return;
    if (!/^[a-z0-9_-]{1,64}$/i.test(key)) { alert('Invalid key.'); return; }
    const name = (prompt('Display name:', key) || '').trim() || key;
    api('/api/projects', { method: 'POST', body: JSON.stringify({ key, name }) })
      .then(() => { projectsState.selected = key; showProjects(); })
      .catch((e) => alert(e.message));
  }

  function relTime(ts) {
    if (!ts) return '—';
    const diff = Date.now() - ts;
    const m = 60 * 1000, h = 60 * m, d = 24 * h;
    if (diff < m)        return 'just now';
    if (diff < h)        return Math.round(diff / m) + 'm ago';
    if (diff < d)        return Math.round(diff / h) + 'h ago';
    if (diff < 7 * d)    return Math.round(diff / d) + 'd ago';
    return new Date(ts).toLocaleDateString();
  }

  function route() {
    const h = location.hash || '#/reports';
    if (h.startsWith('#/projects')) {
      const params = new URLSearchParams(h.split('?')[1] || '');
      // OAuth round-trip lands here with ?zoho_connected=1 or ?zoho_error=...
      // Pull the target project out of the query and select it after load.
      const wanted = params.get('project');
      if (wanted) projectsState.selected = wanted;
      const ok = params.get('zoho_connected');
      const err = params.get('zoho_error');
      showProjects().then(() => {
        if (ok) banner('Zoho connected — pick a portal & project below.', 'ok');
        else if (err) banner('Zoho connect failed: ' + err, 'err');
        if (ok || err) {
          // Strip noisy params from the URL but keep us on the projects view
          history.replaceState(null, '', '#/projects');
        }
      });
    } else {
      showReports();
    }
  }

  function banner(msg, kind) {
    const el = document.createElement('div');
    el.textContent = msg;
    el.style.cssText = `position:fixed; top:64px; left:50%; transform:translateX(-50%); z-index:9999;
      padding:10px 16px; border-radius:8px; font-size:13px;
      background:${kind === 'ok' ? '#dcfce7' : '#fee2e2'};
      color:${kind === 'ok' ? '#166534' : '#991b1b'};
      box-shadow:0 4px 12px rgba(0,0,0,.08);`;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 4500);
  }
  window.addEventListener('hashchange', route);
  tokenInput.onchange = route;
  route();
})();
</script>
</body>
</html>
